openapi: 3.0.3
info:
  title: iGPSPORT Unofficial API
  version: 0.1.0
  license:
    name: ISC
    url: https://opensource.org/license/isc-license-txt
  description: |
    OpenAPI spec generated from `Restfox_2026-02-19(1).json` and enriched with
    request/response types from this repository:
    - `src/api/authPass.ts`
    - `src/api/authOauth.ts`
    - `src/api/addOrEditWorkout.ts`
    - `workout.md`
servers:
  - url: https://i.igpsport.com
    description: Main web host
  - url: https://prod.en.igpsport.com
    description: EN API host
  - url: https://oauth.en.igpsport.com
    description: OAuth host
tags:
  - name: Auth
    description: Authentication and token endpoints
  - name: Activities
    description: Activity list, detail, and download endpoints
  - name: User
    description: User profile and personal settings endpoints
  - name: Workouts
    description: Custom workout endpoints
paths:
  /Auth/Login:
    post:
      tags: [Auth]
      operationId: loginWithPassword
      summary: Login with username/password (legacy session login)
      servers:
        - url: https://i.igpsport.com
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginRequest'
            examples:
              basic:
                value:
                  username: user@example.com
                  password: "******"
      responses:
        '200':
          description: Login response (token is usually returned in `Set-Cookie` as `loginToken`)
          headers:
            Set-Cookie:
              description: May contain `loginToken=<token>; ...`
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLoginResponse'
              examples:
                success:
                  value:
                    Code: 0
                    Message: Success
                    Data: null
                invalidCredentials:
                  value:
                    Code: 403
                    Message: Invalid username or password
                    Data: null
        '403':
          description: Invalid username or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLoginResponse'

  /connect/token:
    post:
      tags: [Auth]
      operationId: getOAuthToken
      summary: OAuth token endpoint (password grant)
      description: |
        Observed in `src/api/authOauth.ts` as:
        `POST https://oauth.en.igpsport.com/connect/token`.

        Client credentials are sent via HTTP Basic auth.
      servers:
        - url: https://oauth.en.igpsport.com
      security:
        - oauthClientBasic: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OAuthPasswordGrantRequest'
      responses:
        '200':
          description: OAuth token payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthTokenSuccessResponse'
        '400':
          description: OAuth error payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthTokenErrorResponse'
        '401':
          description: Unauthorized client/credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthTokenErrorResponse'

