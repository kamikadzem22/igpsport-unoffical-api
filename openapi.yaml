  /service/mobile/api/WorkOut/EditCustomWorkOut:
    post:
      tags: [Workouts]
      operationId: editCustomWorkout
      summary: Create or update custom workout
      description: |
        Uses typed payload from `src/api/addOrEditWorkout.ts`.
        - Create: omit `data.id` or set `data.id` to `"0"`.
        - Update: provide existing workout id in `data.id`.
      servers:
        - url: https://prod.en.igpsport.com
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: query
          required: false
          description: Optional workout id; observed in Restfox when updating.
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddOrEditWorkoutRequest'
            examples:
              create:
                value:
                  memberId: 123456
                  data:
                    id: "0"
                    title: 1h FTP 100%
                    description: 60 min at FTP
                    totalTime: 3600
                    workoutType: bike
                    sportBigType: 1
                    structure:
                      - type: Step
                        intensityClass: Active
                        name: FTP steady
                        length:
                          unit: Second
                          value: 3600
                        intensityTarget:
                          unit: PercentOfFTP
                          minValue: 100
                          maxValue: 100
                        cadenceTarget:
                          unit: Cadence
                          minValue: 90
                          maxValue: 100
                    allowDeletion: true
                    tips: Cool
      responses:
        '200':
          description: Create/update result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddOrEditWorkoutResponse'
              examples:
                success:
                  value:
                    code: 0
                    message: success
                    data:
                      workoutId: 123456
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericApiResponse'
        '401':
          description: Unauthorized

  /service/mobile/api/WorkOut/CustomWorkoutDel:
    post:
      tags: [Workouts]
      operationId: deleteCustomWorkout
      summary: Delete custom workout
      servers:
        - url: https://prod.en.igpsport.com
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: query
          required: false
          description: Optional id in query; request body id is also used.
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteWorkoutRequest'
            examples:
              byId:
                value:
                  id: 500002
      responses:
        '200':
          description: Delete result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteWorkoutResponse'
              examples:
                success:
                  value:
                    code: 0
                    message: ""
                    data: true
        '401':
          description: Unauthorized
