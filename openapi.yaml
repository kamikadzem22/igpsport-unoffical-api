  /service/mobile/api/User/UpdatePersonalIntervalInfo:
    post:
      tags: [User]
      operationId: updatePersonalIntervalInfo
      summary: Update personal interval info
      description: |
        Updates the user's interval settings. To set FTP, call
        `/service/mobile/api/v2/User/UserIntervalInfo`, copy the response `data`,
        change `member.ftp`, and POST the full adjusted object here. Keep the
        zone arrays from the GET response unless intentionally changing them.
      servers:
        - url: https://prod.en.igpsport.com
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersonalIntervalInfo'
            examples:
              setFtp:
                summary: Set FTP to 250 W
                value:
